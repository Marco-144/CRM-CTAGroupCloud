<div class="settings-view">
	<div class="d-flex justify-content-between align-items-center mb-4">
		<h4 class="fw-semibold mb-0">Configuración</h4>
	</div>

	<div class="accordion settings-accordion" id="settingsAccordion">
		<div class="accordion-item card border-0 shadow-sm rounded-4 mb-3 overflow-hidden">
			<h2 class="accordion-header" id="headingUsers">
				<button class="accordion-button" type="button" data-bs-toggle="collapse" data-bs-target="#collapseUsers"
					aria-expanded="true" aria-controls="collapseUsers">
					<span><i class="bi bi-people me-2"></i>Usuarios</span>
				</button>
			</h2>
			<div id="collapseUsers" class="accordion-collapse collapse show" aria-labelledby="headingUsers"
				data-bs-parent="#settingsAccordion">
				<div class="accordion-body p-4">
					<div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-3">
						<div>
							<h5 class="mb-1">Gestión de usuarios</h5>
							<small class="text-muted">Listado de usuarios registrados.</small>
						</div>
						<button class="btn btn-primary rounded-3" id="openUserModal" data-bs-toggle="modal"
							data-bs-target="#userModal">
							<i class="bi bi-plus-lg"></i> Agregar Usuario
						</button>
					</div>

					<div class="table-responsive">
						<table class="table align-middle mb-0">
							<thead>
								<tr>
									<th>Usuario</th>
									<th>Nombre</th>
									<th>Email</th>
									<th>Departamento</th>
									<th>Rol</th>
									<th class="text-end">Acciones</th>
								</tr>
							</thead>
							<tbody id="usersTableBody"></tbody>
						</table>
					</div>
				</div>
			</div>
		</div>

		<div class="accordion-item card border-0 shadow-sm rounded-4 mb-3 overflow-hidden">
			<h2 class="accordion-header" id="headingLogo">
				<button class="accordion-button collapsed" type="button" data-bs-toggle="collapse"
					data-bs-target="#collapseLogo" aria-expanded="false" aria-controls="collapseLogo">
					<span><i class="bi bi-image me-2"></i>Cambiar logo</span>
				</button>
			</h2>
			<div id="collapseLogo" class="accordion-collapse collapse" aria-labelledby="headingLogo"
				data-bs-parent="#settingsAccordion">
				<div class="accordion-body p-4">
					<p class="mb-3 text-muted">Selecciona un nuevo logo para la plataforma.</p>
					<div class="d-flex gap-2 flex-wrap">
						<input type="file" class="form-control" style="max-width: 360px;" disabled>
						<button class="btn btn-outline-secondary" disabled>Guardar logo</button>
					</div>
				</div>
			</div>
		</div>

		<div class="accordion-item card border-0 shadow-sm rounded-4 overflow-hidden">
			<h2 class="accordion-header" id="headingColors">
				<button class="accordion-button collapsed" type="button" data-bs-toggle="collapse"
					data-bs-target="#collapseColors" aria-expanded="false" aria-controls="collapseColors">
					<span><i class="bi bi-palette me-2"></i>Cambiar colores</span>
				</button>
			</h2>
			<div id="collapseColors" class="accordion-collapse collapse" aria-labelledby="headingColors"
				data-bs-parent="#settingsAccordion">
				<div class="accordion-body p-4">
					<p class="mb-0 text-muted">Configura los colores principales del sistema.</p>
				</div>
			</div>
		</div>
	</div>

	<div class="modal fade" id="userModal" tabindex="-1" aria-hidden="true">
		<div class="modal-dialog modal-dialog-centered">
			<div class="modal-content rounded-4">
				<div class="modal-header">
					<h5 class="modal-title" id="userModalTitle">Agregar Usuario</h5>
					<button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
				</div>
				<div class="modal-body">
					<form id="userForm">
						<input type="hidden" id="userId">

						<div class="mb-3">
							<label class="form-label">Usuario</label>
							<input type="text" class="form-control" id="userUsername" required>
						</div>

						<div class="mb-3">
							<label class="form-label">Nombre</label>
							<input type="text" class="form-control" id="userName" required>
						</div>

						<div class="mb-3">
							<label class="form-label">Email</label>
							<input type="email" class="form-control" id="userEmail" required>
						</div>

						<div class="mb-3">
							<label class="form-label">Departamento</label>
							<select class="form-select" id="userDepartment" required>
								<option value="" selected disabled>Selecciona un departamento</option>
							</select>
						</div>

						<div class="mb-3">
							<label class="form-label">Rol</label>
							<select class="form-select" id="userRole" required>
								<option value="" selected disabled>Selecciona un rol</option>
							</select>
						</div>

						<div class="mb-3">
							<label class="form-label">Contraseña</label>
							<input type="password" class="form-control" id="userPassword" minlength="6">
							<small class="text-muted">Requerida al crear. En edición es opcional.</small>
						</div>

						<button type="submit" class="btn btn-primary w-100" id="saveUserBtn">Guardar</button>
					</form>
				</div>
			</div>
		</div>
	</div>
</div>
