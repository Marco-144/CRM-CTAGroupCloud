<!-- HEADER -->
<div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="fw-semibold" id="welcomeMessage">Hola Usuario 👋</h4>
    
    <div class="input-group w-25">
        <span class="input-group-text bg-white border-end-0">
            <i class="bi bi-search"></i>
        </span>
        <input type="text" class="form-control border-start-0" placeholder="Buscar...">
    </div>
</div>

<!-- KPIs -->
<div class="row mb-4">

    <div class="col-md-4">
        <div class="card shadow-sm border-0 rounded-4 p-3">
            <div class="d-flex align-items-center">
                <div class="icon-circle bg-success-subtle me-3">
                    <i class="bi bi-people fs-4 text-success"></i>
                </div>
                <div>
                    <small>Ventas Totales</small>
                    <h4 class="fw-bold">N/A</h4>
                </div>
            </div>
        </div>
    </div>

    <div class="col-md-4">
        <div class="card shadow-sm border-0 rounded-4 p-3">
            <div class="d-flex align-items-center">
                <div class="icon-circle bg-primary-subtle me-3">
                    <i class="bi bi-currency-dollar fs-4 text-primary"></i>
                </div>
                <div>
                    <small>Ventas del Mes</small>
                    <h4 class="fw-bold">N/A</h4>
                </div>
            </div>
        </div>
    </div>

    <div class="col-md-4">
        <div class="card shadow-sm border-0 rounded-4 p-3">
            <div class="d-flex align-items-center">
                <div class="icon-circle bg-warning-subtle me-3">
                    <i class="bi bi-kanban fs-4 text-warning"></i>
                </div>
                <div>
                    <small>Proyectos Activos</small>
                    <h4 class="fw-bold">N/A</h4>
                </div>
            </div>
        </div>
    </div>

</div>
