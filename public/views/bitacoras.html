<div class="bitacoras-view">

    <!-- HEADER -->
    <div class="d-flex justify-content-between align-items-center mb-4 gap-2 flex-wrap">
        <div class="d-flex align-items-center gap-2">
            <button class="btn btn-light d-lg-none sidebar-mobile-toggle" id="mobileMenuBtn" type="button"
                aria-label="Abrir menú lateral">
                <i class="bi bi-list fs-4"></i>
            </button>
            <h4 class="fw-semibold mb-0">Bitácoras</h4>
        </div>
        <button class="btn btn-primary rounded-3" id="openAddBitacora">
            <i class="bi bi-plus-lg"></i> Nueva Bitácora
        </button>
    </div>

    <!-- CARD CONTENEDOR -->
    <div class="card border-0 shadow-sm rounded-4 p-4">
        <div class="d-flex justify-content-between align-items-center gap-2 flex-wrap mb-3">
            <div>
                <h5 class="mb-1">Consulta de Bitácoras</h5>
                <small class="text-muted">Crear, editar y eliminar bitácoras de trabajo</small>
            </div>
            <input type="text" class="form-control" id="searchBitacoras" placeholder="Buscar bitácora..."
                style="width: 260px;">
        </div>

        <!-- GRID -->
        <div id="bitacorasGrid" class="bitacoras-grid"></div>
    </div>

</div>
