<div class="clients-view">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="fw-semibold mb-0">Clientes</h4>
        <button class="btn btn-primary rounded-3" id="openAddClient">
            <i class="bi bi-plus-lg"></i> Agregar Cliente
        </button>
    </div>

    <div class="card border-0 shadow-sm rounded-4 p-4">
        <div class="d-flex justify-content-between align-items-center gap-2 flex-wrap mb-3">
            <div>
                <h5 class="mb-1">Clientes</h5>
                <small class="text-muted">Perfiles fiscales y constancia de situacion fiscal</small>
            </div>

            <input type="text" class="form-control" id="clientsSearch" placeholder="Buscar cliente..."
                style="width: 260px;">
        </div>

        <table class="table align-middle mb-0">
            <thead>
                <tr>
                    <th>Empresa</th>
                    <th>Contacto</th>
                    <th>RFC</th>
                    <th>Email fiscal</th>
                    <th>Constancia</th>
                    <th class="text-end">Acciones</th>
                </tr>
            </thead>
            <tbody id="clientsTable"></tbody>
        </table>
    </div>

    <div class="modal fade" id="clientDetailModal" tabindex="-1">
        <div class="modal-dialog modal-lg modal-dialog-scrollable">
            <div class="modal-content rounded-4">
                <div class="modal-header">
                    <h5 class="modal-title fw-semibold">Detalle del Cliente</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="clientDetailBody"></div>
            </div>
        </div>
    </div>
</div>
