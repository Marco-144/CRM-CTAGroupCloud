<div class="ventas-view">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="fw-semibold mb-0">Ventas</h4>
    </div>

    <div class="card border-0 shadow-sm rounded-4 p-4">
        <div class="d-flex justify-content-between align-items-center gap-2 flex-wrap mb-3">
            <div>
                <h5 class="mb-1">Listado de ventas</h5>
                <small class="text-muted">Consulta de ventas y pagos registrados</small>
            </div>

            <input type="text" class="form-control" id="salesSearch" placeholder="Buscar por folio o empresa..."
                style="width: 280px;">
        </div>

        <table class="table align-middle mb-0">
            <thead>
                <tr>
                    <th>Folio</th>
                    <th>Empresa</th>
                    <th>Fecha</th>
                    <th>Total</th>
                    <th>Pendiente</th>
                    <th>Pago</th>
                    <th>Estatus</th>
                    <th class="text-end">Acciones</th>
                </tr>
            </thead>
            <tbody id="salesTable"></tbody>
        </table>
    </div>

    <div class="modal fade" id="saleDetailModal" tabindex="-1">
        <div class="modal-dialog modal-lg modal-dialog-scrollable">
            <div class="modal-content rounded-4">
                <div class="modal-header">
                    <h5 class="modal-title fw-semibold">Detalle de venta</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="saleDetailBody"></div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="addPaymentModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content rounded-4">
                <div class="modal-header">
                    <h5 class="modal-title fw-semibold">Registrar pago</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <form id="paymentForm">
                    <div class="modal-body">
                        <input type="hidden" id="paymentSaleId">

                        <div class="mb-3">
                            <label class="form-label">Monto</label>
                            <input type="number" class="form-control" id="paymentAmount" min="0.01" step="0.01"
                                required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Metodo de pago</label>
                            <select class="form-select" id="paymentMethod" required>
                                <option value="Transferencia">Transferencia</option>
                                <option value="Efectivo">Efectivo</option>
                                <option value="Tarjeta">Tarjeta</option>
                                <option value="Cheque">Cheque</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Referencia</label>
                            <input type="text" class="form-control" id="paymentReference">
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-outline-secondary"
                            data-bs-dismiss="modal">Cancelar</button>
                        <button type="submit" class="btn btn-primary">Guardar pago</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
