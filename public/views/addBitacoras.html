<div class="add-bitacora container-fluid">
    <div class="d-flex justify-content-between align-items-center mb-4 gap-2 flex-wrap">
        <div class="d-flex align-items-center gap-2">
            <button class="btn btn-light d-lg-none sidebar-mobile-toggle" id="mobileMenuBtn" type="button"
                aria-label="Abrir menú lateral">
                <i class="bi bi-list fs-4"></i>
            </button>
            <h4 class="fw-semibold mb-0">Bitácora</h4>
        </div>
        <button type="button" class="btn btn-outline-secondary rounded-3"
            onclick="loadView('views/bitacoras.html', 'css/bitacoras.css', 'js/bitacoras.js')">
            <i class="bi bi-arrow-left"></i> Regresar
        </button>
    </div>

    <div class="card border-0 shadow-sm rounded-4 p-4">
        <form class="bitacora-form" id="bitacoraForm">
            <div class="form-group">
                <label for="titulo">Título *</label>
                <input type="text" id="titulo" class="form-control" placeholder="Ingresa el título de la bitácora"
                    required>
            </div>

            <div class="form-group">
                <label for="contenidoEditor">Contenido *</label>
                <textarea id="contenidoEditor" class="editor-container"></textarea>
            </div>

            <div class="actions">
                <button type="button" class="btn btn-secondary"
                    onclick="loadView('views/bitacoras.html', 'css/bitacoras.css', 'js/bitacoras.js')">Cancelar</button>
                <button type="button" id="saveBtn" class="btn btn-primary">Guardar</button>
            </div>
        </form>
    </div>

</div>
