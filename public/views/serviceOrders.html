<div class="cotizacion-view">
    <div class="d-flex justify-content-between align-items-center mb-4 gap-2 flex-wrap">
        <div class="d-flex align-items-center gap-2">
            <button class="btn btn-light d-lg-none sidebar-mobile-toggle" id="mobileMenuBtn" type="button"
                aria-label="Abrir menú lateral">
                <i class="bi bi-list fs-4"></i>
            </button>
            <h4 class="fw-semibold mb-0">Órdenes de Servicio</h4>
        </div>
        <button class="btn btn-primary rounded-3" id="openAddSO">
            <i class="bi bi-plus-lg"></i> Nueva Orden
        </button>
    </div>

    <div class="card border-0 shadow-sm rounded-4 p-4">
        <div class="d-flex justify-content-between align-items-center gap-2 flex-wrap mb-3">
            <div>
                <h5 class="mb-1">Consulta de órdenes</h5>
                <small class="text-muted">Insertar, editar y eliminar órdenes de servicio</small>
            </div>

            <div class="d-flex gap-2 flex-wrap">
                <input type="text" class="form-control" id="soSearch" placeholder="Buscar orden..."
                    style="width: 220px;">
                <select class="form-select" id="soStatusFilter" style="width: 180px;">
                    <option value="">Estatus: Todos</option>
                    <option value="pendiente">Pendiente</option>
                    <option value="activa">Activa</option>
                    <option value="completada">Completada</option>
                    <option value="cancelada">Cancelada</option>
                </select>
                <select class="form-select" id="soPriorityFilter" style="width: 180px;">
                    <option value="">Prioridad: Todas</option>
                    <option value="bajo">Bajo</option>
                    <option value="medio">Medio</option>
                    <option value="alto">Alto</option>
                    <option value="urgente">Urgente</option>
                </select>
            </div>
        </div>

        <div class="table-responsive">
            <table class="table align-middle mb-0">
                <thead>
                    <tr>
                        <th>Folio</th>
                        <th>Cliente</th>
                        <th>Ticket</th>
                        <th>Asignado a</th>
                        <th>Tipo de servicio</th>
                        <th>Prioridad</th>
                        <th>Estatus</th>
                        <th class="text-end">Fecha</th>
                        <th class="text-end">Acciones</th>
                    </tr>
                </thead>
                <tbody id="serviceOrdersTable"></tbody>
            </table>
        </div>

        <div id="serviceOrdersCards" class="mt-3"></div>
    </div>

    <div class="modal fade" id="serviceOrderModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content rounded-4">
                <div class="modal-header">
                    <h5 class="modal-title fw-semibold" id="serviceOrderModalTitle">Nueva Orden de Servicio</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <form id="serviceOrderForm">
                    <div class="modal-body">
                        <input type="hidden" id="soId">

                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label">Cliente</label>
                                <select class="form-select" id="soProspect" required></select>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label">Ticket (opcional)</label>
                                <select class="form-select" id="soTicket"></select>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label">Tipo de servicio</label>
                                <input type="text" class="form-control" id="soServiceType" required>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label">Asignado a</label>
                                <select class="form-select" id="soAssignedUser">
                                    <option value="">Sin asignar</option>
                                </select>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label">Prioridad</label>
                                <select class="form-select" id="soPriority" required>
                                    <option value="bajo">Bajo</option>
                                    <option value="medio" selected>Medio</option>
                                    <option value="alto">Alto</option>
                                    <option value="urgente">Urgente</option>
                                </select>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label">Estatus</label>
                                <select class="form-select" id="soStatus" required>
                                    <option value="pendiente" selected>Pendiente</option>
                                    <option value="activa">Activa</option>
                                    <option value="completada">Completada</option>
                                    <option value="cancelada">Cancelada</option>
                                </select>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label">Fecha inicio</label>
                                <input type="date" class="form-control" id="soStartDate">
                            </div>

                            <div class="col-md-6">
                                <label class="form-label">Fecha entrega estimada</label>
                                <input type="date" class="form-control" id="soEstimatedDelivery">
                            </div>

                            <div class="col-12">
                                <label class="form-label">Descripción</label>
                                <textarea class="form-control" id="soDescription" rows="3"></textarea>
                            </div>

                            <div class="col-12">
                                <label class="form-label">Adjuntos iniciales</label>
                                <input type="file" class="form-control" id="soAttachment"
                                    accept="image/*,application/pdf" multiple>
                                <small class="text-muted">Opcional: uno o varios archivos (imagenes o PDF, max 8MB por
                                    archivo)</small>
                            </div>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-outline-secondary"
                            data-bs-dismiss="modal">Cancelar</button>
                        <button type="submit" class="btn btn-primary" id="saveSO">Guardar Orden</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

</div>
