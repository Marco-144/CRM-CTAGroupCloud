<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/login.css">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="text-center mb-4">
                <img id="companyLogo" alt="Company Logo" class="login-logo">
            </div>

            <!-- <h3 class="text-center mb-4">Login</h3> -->

            <form id="loginForm">
                <div class="mb-3">
                    <label for="user" class="form-label">User</label>
                    <input class="form-control" id="user" type="text" placeholder="Adrian_Serrano" required>
                </div>

                <div class="mb-3">
                    <label for="password" class="form-label">Password</label>
                    <input class="form-control" id="password" type="password" placeholder="adrianS98" required>
                </div>

                <button type="submit" class="btn btn-primary w-100">Enter</button>
            </form>

            <p class="text-center mt-3 small text-muted">© 2026 CRM CTA. Todos los derechos reservados.</p>
        </div>
    </div>

    <script src="js/login.js"></script>
</body>
</html>
